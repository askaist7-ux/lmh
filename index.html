<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓國山蔘鑑定院</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root {
      --bg: #f5efe7;
      --card: rgba(255, 255, 255, 0.95);
      --text: #2f241d;
      --muted: #6f5c4d;
      --accent: #8a5a2b;
      --accent-soft: #e8d4b4;
      --shadow: 0 20px 50px rgba(88, 58, 22, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Nanum Gothic', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #f7efe5 0%, #efe1cb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(138, 90, 43, 0.08);
    }

    header {
      padding: 42px 36px 24px;
      background: linear-gradient(90deg, #f0e2c8 0%, #e6d1aa 100%);
      color: #5a3b20;
      text-align: center;
    }

    .brand-badge {
      display: inline-block;
      padding: 7px 14px;
      border: 1px solid rgba(90, 59, 32, 0.2);
      border-radius: 999px;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.55);
      color: #6b4a26;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px 0 12px;
    }

    .logo-wrap img {
      width: 150px;
      height: auto;
      max-width: 100%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.4vw, 2.1rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    main {
      padding: 36px;
    }

    .hero {
      display: grid;
      gap: 22px;
      align-items: center;
    }

    .intro-card {
      background: linear-gradient(180deg, #fffaf4 0%, #f7ecde 100%);
      border: 1px solid var(--accent-soft);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 10px 25px rgba(138, 90, 43, 0.08);
      text-align: center;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
      color: var(--accent);
      font-weight: 800;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.8;
      font-size: 0.98rem;
      color: var(--muted);
      text-align: center;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 14px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(138, 90, 43, 0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .status:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(138, 90, 43, 0.16);
    }

    footer {
      padding: 0 36px 36px;
      text-align: center;
    }

    footer p {
      margin: 0;
      color: #7b654d;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      header, main, footer { padding-left: 20px; padding-right: 20px; }
      .intro-card { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand-badge">정성을 담은 산삼 감정</div>
      <div class="logo-wrap">
        <img src="http://www.3325.kr/images/logo.png" alt="한국산삼감정원 로고">
      </div>
      <h1>韓國山蔘鑑定院</h1>
    </header>

    <main>
      <section class="hero">
        <div class="intro-card">
          <h2 id="greeting">한국산삼감정원 이민홍 원장입니다.</h2>

          <p>
            한국산삼감정원 홈페이지를 찾아주셔서 감사합니다.
          </p>

          <p>
            신뢰 있는 산삼 감정 정보와 품격 있는 안내를 준비하고 있습니다.
          </p>

          <div class="status" id="statusText">현재 공사중입니다.</div>
        </div>
      </section>
    </main>

    <footer>
      <p>韓國山蔘鑑定院 원장 이민홍</p>
    </footer>
  </div>

  <script>
    const greeting = document.getElementById('greeting');
    const statusText = document.getElementById('statusText');

    const messages = [
      '한국산삼감정원 이민홍 원장입니다.',
      '정성과 책임으로 산삼을 안내합니다.',
      '고객님께 신뢰 있는 감정 정보를 드립니다.'
    ];

    let index = 0;
    setInterval(() => {
      greeting.style.opacity = '0';
      setTimeout(() => {
        greeting.textContent = messages[index % messages.length];
        greeting.style.opacity = '1';
        index++;
      }, 250);
    }, 3000);

    statusText.addEventListener('mouseenter', () => {
      statusText.textContent = '곧 더 좋은 모습으로 찾아뵙겠습니다.';
    });

    statusText.addEventListener('mouseleave', () => {
      statusText.textContent = '현재 공사중입니다.';
    });
  </script>
</body>
</html>
